<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1" width="40%" align="center" cellpadding="10">
        <caption>SignUp Form</caption>
        <tr>
            <th width="35%" align="right">User Name:</th>
            <td width="65%"><input type="text"></td>
        </tr>
        <tr>
            <th align="right">Email:</th>
            <td><input type="email"></td>
        </tr>
        <tr>
            <th align="right">Password:</th>
            <td><input type="password"></td>
        </tr>
        <tr>
            <th align="right">Food Options:</th>
            <td>
                <input type="checkbox" name="food"> Samosa &nbsp;&nbsp;&nbsp;
                <input type="checkbox" name="food"> Jalebi &nbsp;&nbsp;&nbsp;
                <input type="checkbox" name="food"> Poha
            </td>
        </tr>
        <tr>
            <th align="right">Trave Options</th>
            <td>
                <input type="radio" name="trv">Bus &nbsp;&nbsp;&nbsp;
                <input type="radio" name="trv">Jeep &nbsp;&nbsp;&nbsp;
                <input type="radio" name="trv">Car 
            </td>
        </tr>

    </table>
</body>
</html>
