<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="A23.html">
        <table border="1" width="40%" align="center" cellpadding="10">
            <caption>SignUp Form</caption>
            <tr>
                <th width="35%" align="right">First Name:</th>
                <td width="65%"><input type="text" name="unm" placeholder="Please Enter Valid Name" required="required"></td>
            </tr>
            <tr>
                <th width="35%" align="right">Middle Name:</th>
                <td width="65%"><input type="text" name="unm" value="Prasad" readonly required></td>
            </tr>
            <tr>
                <th width="35%" align="right">Last Name:</th>
                <td width="65%"><input type="text" name="unm" disabled value="Kumar" required></td>
            </tr>
            <tr>
                <th align="right">Email:</th>
                <td><input type="email" name="eml" required  placeholder="Please Enter Valid Email"></td>
            </tr>
            <tr>
                <th align="right">Password:</th>
                <td><input type="password" name="pwd" required></td>
            </tr>
            <tr>
                <th align="right">Food Options:</th>
                <td>
                    <input type="checkbox" name="food" value="samosa"> Samosa &nbsp;&nbsp;&nbsp;
                    <input type="checkbox" name="food" value="jalebi" disabled> Jalebi &nbsp;&nbsp;&nbsp;
                    <input type="checkbox" name="food" value="poha"> Poha
                </td>
            </tr>
            <tr>
                <th align="right">Trave Options</th>
                <td>
                    <input type="radio" name="trv" value="bus">Bus &nbsp;&nbsp;&nbsp;
                    <input type="radio" name="trv" value="jeep" disabled>Jeep &nbsp;&nbsp;&nbsp;
                    <input type="radio" name="trv" value="car">Car 
                </td>
            </tr>
            <tr>
                <th width="35%" align="right">City</th>
                <td width="65%">
                    <select name="city" required>
                        <option>Jabalpur</option>
                        <option disabled>Jaipur</option>
                        <option>Jagdalpur</option>
                        <option>Kanpur</option>
                        <option>Nagpur</option>
                    </select>
                </td>
            </tr>
            <tr>
                <th align="right">Message</th>
                <td>                    
                    <textarea name="msg" required></textarea>
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit">
                </td>
            </tr>
        </table>
    </form>
    
</body>
</html>
