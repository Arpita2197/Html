<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Address Bar After form submission: file:///D:/htmlprac/A23.html?unm=Gopal+Prasad&eml=gopu%40gmail.com&pwd=1234556&food=on&food=on&trv=on&city=Jaipur&msg=My+Jaipur+Visit -->
    <!-- Input Fields/Form Fields/Form Controls: input/select/textarea -->

    <form action="A23.html">
        <table border="1" width="40%" align="center" cellpadding="10">
            <caption>SignUp Form</caption>
            <tr>
                <th width="35%" align="right">User Name:</th>
                <td width="65%"><input type="text" name="unm"></td>
            </tr>
            <tr>
                <th align="right">Email:</th>
                <td><input type="email" name="eml"></td>
            </tr>
            <tr>
                <th align="right">Password:</th>
                <td><input type="password" name="pwd"></td>
            </tr>
            <tr>
                <th align="right">Food Options:</th>
                <td>
                    <input type="checkbox" name="food"> Samosa &nbsp;&nbsp;&nbsp;
                    <input type="checkbox" name="food"> Jalebi &nbsp;&nbsp;&nbsp;
                    <input type="checkbox" name="food"> Poha
                </td>
            </tr>
            <tr>
                <th align="right">Trave Options</th>
                <td>
                    <input type="radio" name="trv">Bus &nbsp;&nbsp;&nbsp;
                    <input type="radio" name="trv">Jeep &nbsp;&nbsp;&nbsp;
                    <input type="radio" name="trv">Car 
                </td>
            </tr>
            <tr>
                <th width="35%" align="right">City</th>
                <td width="65%">
                    <select name="city">
                        <option>Jabalpur</option>
                        <option>Jaipur</option>
                        <option>Jagdalpur</option>
                        <option>Kanpur</option>
                        <option>Nagpur</option>
                    </select>
                </td>
            </tr>
            <tr>
                <th align="right">Message</th>
                <td>                    
                    <textarea name="msg"></textarea>
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <input type="submit">
                </td>
            </tr>
        </table>
    </form>
    
</body>
</html>
